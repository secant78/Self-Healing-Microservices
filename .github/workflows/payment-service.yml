name: Payment Service CI/CD

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'services/payment-service/**'
  pull_request:
    branches:
      - main
    paths:
      - 'services/payment-service/**'

permissions:
  id-token: write
  contents: read

env:
  SERVICE_NAME: payment-service
  IMAGE_NAME: self-healing-payment-service
  PYTHON_VERSION: '3.12'

jobs:
  build-and-test:
    name: Build and Test (Python / FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/payment-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: services/payment-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Run linting with ruff (if available)
        run: |
          if pip show ruff > /dev/null 2>&1; then
            ruff check .
          else
            echo "ruff not in requirements, skipping lint."
          fi

      - name: Run tests with pytest
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest \
              --cov=app \
              --cov-report=xml \
              --cov-report=term-missing \
              -v
          else
            echo "No test files found, skipping pytest."
          fi

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always() && hashFiles('services/payment-service/coverage.xml') != ''
        with:
          files: services/payment-service/coverage.xml
          flags: payment-service

  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: >
      github.event_name == 'push' &&
      secrets.AZURE_CLIENT_ID != '' &&
      secrets.AZURE_TENANT_ID != '' &&
      secrets.AZURE_SUBSCRIPTION_ID != '' &&
      secrets.ACR_NAME != ''
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          IMAGE_TAG="${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          LATEST_TAG="${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.meta.outputs.image_tag }} \
            --tag ${{ steps.meta.outputs.latest_tag }} \
            --label "git.sha=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            services/payment-service/

      - name: Push Docker image to ACR
        run: |
          docker push ${{ steps.meta.outputs.image_tag }}
          docker push ${{ steps.meta.outputs.latest_tag }}

  deploy-to-aca:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App with new image
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ needs.docker-build-push.outputs.image_tag }}

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          PROVISIONING_STATE=$(az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "properties.provisioningState" \
            --output tsv)
          echo "Provisioning state: ${PROVISIONING_STATE}"
          if [ "${PROVISIONING_STATE}" != "Succeeded" ]; then
            echo "Deployment did not succeed. State: ${PROVISIONING_STATE}"
            exit 1
          fi

      - name: Print deployment summary
        run: |
          FQDN=$(az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Payment Service deployed successfully."
          echo "URL: https://${FQDN}"
          echo "Image: ${{ needs.docker-build-push.outputs.image_tag }}"
